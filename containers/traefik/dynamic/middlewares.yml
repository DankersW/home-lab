http:
  middlewares:
    receipts-headers:
      headers:
        customRequestHeaders:
          # Tell the backend the original scheme; TLS terminates at Cloudflare.
          X-Forwarded-Proto: "https"
          # NOTE: the Cf-Access-Authenticated-User-Email header is passed through
          # untouched — the receipts service trusts it for the current user.
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "SAMEORIGIN"
          Referrer-Policy: "strict-origin-when-cross-origin"

    dozzle-headers:
      headers:
        customRequestHeaders:
          # TLS terminates at Cloudflare; tell the backend the original scheme.
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "SAMEORIGIN"
          Referrer-Policy: "strict-origin-when-cross-origin"

    adguard-headers:
      headers:
        customRequestHeaders:
          # TLS terminates at Cloudflare; tell the backend the original scheme.
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "SAMEORIGIN"
          Referrer-Policy: "strict-origin-when-cross-origin"

    audiobookshelf-headers:
