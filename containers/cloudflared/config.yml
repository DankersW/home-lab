tunnel: 7c3acfe6-f333-4ec3-bb6b-759c159c731d
credentials-file: /run/secrets/cloudflared_credentials

ingress:
  - hostname: home.dankers.io
    service: http://traefik:80
  - hostname: receipts.dankers.io
    service: http://traefik:80
  - hostname: status.dankers.io
    service: http://traefik:80
  # Wildcard smoke test: a name with no explicit DNS record, answered by the
  # tunnel itself (no Traefik, no backend). 200 here proves * → tunnel works.
  # Remove once verified.
  - hostname: ping.dankers.io
    service: http_status:200
  # Required catch-all: undeclared hostnames get a 404 at the edge.
  - service: http_status:404
