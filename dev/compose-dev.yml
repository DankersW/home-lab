# Local dev stack: the app services reachable over 127.0.0.1, without the edge
# (no traefik, no cloudflared).
name: homelab-dev

services:

  receipts:
    build:
      context: ./containers/receipts
    image: homelab/receipts:dev
    container_name: homelab_receipts_dev
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      - minio
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./containers/receipts/data:/data
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - homelab
    environment:
      LISTEN_ADDR: ":8080"
      SQLITE_PATH: /data/receipts.db
      TMPDIR: /data/tmp
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: receipts
      MINIO_ACCESS_KEY_FILE: /run/secrets/minio_access_key
      MINIO_SECRET_KEY_FILE: /run/secrets/minio_secret_key
      REQUIRE_AUTH: "false"
      DEV_USER_EMAIL: dev@localhost

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: homelab_minio_dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./containers/minio/data:/data
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - homelab
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key

  dozzle:
    image: amir20/dozzle:v10.6.6
    container_name: homelab_dozzle_dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homelab
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_AUTH_PROVIDER: none


networks:
  homelab:
    driver: bridge


secrets:
  minio_access_key:
    file: ./infra/secrets/minio_access_key
  minio_secret_key:
    file: ./infra/secrets/minio_secret_key
