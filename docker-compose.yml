services:

  receipts:
    build:
      context: ./services/receipts
    image: homelab/receipts:latest
    container_name: homelab_receipts
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      - minio
    volumes:
      - ./services/receipts/data:/data
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - homelab
    environment:
      LISTEN_ADDR: ":8080"
      SQLITE_PATH: /data/receipts.db
      TMPDIR: /data/tmp
      # Use the compose service name (no underscore): MinIO rejects a Host
      # header containing '_' with "invalid hostname".
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: receipts
      MINIO_ACCESS_KEY_FILE: /run/secrets/minio_access_key
      MINIO_SECRET_KEY_FILE: /run/secrets/minio_secret_key
      REQUIRE_AUTH: "true"
    # No published ports — reachable only via Traefik on the homelab network.

  minio:
    image: minio/minio:latest
    container_name: homelab_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - ./minio/data:/data
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - homelab
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    # No published ports — internal only.

  homer:
    image: b4bz/homer
    container_name: homer_dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./homer/assets:/www/assets
    networks:
      - homelab
    environment:
      - UID=1000
      - GID=1000

  traefik:
    image: traefik:v2.11
    container_name: homelab_traefik
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - homelab
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: homelab_cloudflared
    command: tunnel --no-autoupdate run --token-file /run/secrets/cloudflared_token
    secrets:
      - cloudflared_token
    networks:
      - homelab
    restart: unless-stopped


networks:
  homelab:
    driver: bridge


secrets:
  cloudflared_token:
    file: ./secrets/cloudflared_token
  minio_access_key:
    file: ./secrets/minio_access_key
  minio_secret_key:
    file: ./secrets/minio_secret_key
