services:

  receipts:
    build:
      context: ./containers/receipts
    image: homelab/receipts:latest
    container_name: homelab_receipts
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      - minio
    volumes:
      - ./containers/receipts/data:/data
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - homelab
    environment:
      LISTEN_ADDR: ":8080"
      SQLITE_PATH: /data/receipts.db
      TMPDIR: /data/tmp
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: receipts
      MINIO_ACCESS_KEY_FILE: /run/secrets/minio_access_key
      MINIO_SECRET_KEY_FILE: /run/secrets/minio_secret_key
      REQUIRE_AUTH: "true"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: homelab_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - ./containers/minio/data:/data
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - homelab
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key

  homer:
    image: b4bz/homer:v26.4.2
    container_name: homer_dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./containers/homer/assets:/www/assets
    networks:
      - homelab
    environment:
      - UID=1000
      - GID=1000

  dozzle:
    image: amir20/dozzle:v10.6.6
    container_name: homelab_dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homelab
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_AUTH_PROVIDER: forward-proxy
      DOZZLE_AUTH_HEADER_USER: Cf-Access-Authenticated-User-Email
      DOZZLE_AUTH_HEADER_EMAIL: Cf-Access-Authenticated-User-Email
      DOZZLE_AUTH_HEADER_NAME: Cf-Access-Authenticated-User-Email

  traefik:
    image: traefik:v3.7.5
    container_name: homelab_traefik
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    volumes:
      - ./containers/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./containers/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - homelab
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.6.0
    container_name: homelab_cloudflared
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./containers/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    secrets:
      - cloudflared_credentials
    networks:
      - homelab
    restart: unless-stopped
    environment:
      TUNNEL_TRANSPORT_PROTOCOL: http2


networks:
  homelab:
    driver: bridge


secrets:
  cloudflared_credentials:
    file: ./infra/secrets/cloudflared_credentials
  minio_access_key:
    file: ./infra/secrets/minio_access_key
  minio_secret_key:
    file: ./infra/secrets/minio_secret_key
