name: deploy

on:
  push:
    branches: [main]

# Never run two deploys at once on the Pi; let an in-flight one finish.
concurrency:
  group: deploy-pi
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy stack on the Pi
        run: bash infra/scripts/deploy.sh
